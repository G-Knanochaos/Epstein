<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Higher or Lower — Epstein Edition</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'game/css/style.css' %}" />
  <link rel="icon" type="image/png" href="{% static 'game/favicon.png' %}" />
</head>
<body>

<!-- ── Score ──────────────────────────────────────────────────────────────── -->
<div class="score-box">
  <span class="score-label">SCORE</span>
  <span class="score-value" id="score">{{ score }}</span>
</div>

<!-- ── Game area ───────────────────────────────────────────────────────────── -->
<main class="game-wrap" id="gameWrap">

  <!-- LEFT card (already revealed) -->
  <div class="card card-left" id="cardLeft">
    <div class="card-bg" id="bgLeft"
         style="background-image: url('{{ left.image_url }}')"></div>
    <div class="card-overlay"></div>
    <div class="card-content">
      <div class="name-row">
        <h2 class="card-name" id="nameLeft">{{ left.full_name }}</h2>
        <button class="info-btn" onclick="toggleBio('descLeft', this)" aria-label="Show info">ⓘ</button>
      </div>
      <p class="card-bio hidden" id="descLeft">{{ left.description }}</p>
      <p class="card-label">has</p>
      <p class="card-count" id="countLeft">{{ left.epstein_mentions }}</p>
      <p class="card-unit">Epstein document mentions</p>
    </div>
  </div>

  <!-- VS divider -->
  <div class="vs-circle" id="vsCircle">VS</div>

  <!-- RIGHT card (to be guessed) -->
  <div class="card card-right" id="cardRight">
    <div class="card-bg" id="bgRight"
         style="background-image: url('{{ right.image_url }}')"></div>
    <div class="card-overlay"></div>
    <div class="card-content">
      <div class="name-row">
        <h2 class="card-name" id="nameRight">{{ right.full_name }}</h2>
        <button class="info-btn" onclick="toggleBio('descRight', this)" aria-label="Show info">ⓘ</button>
      </div>
      <p class="card-bio hidden" id="descRight">{{ right.description }}</p>
      <p class="card-label">has</p>
      <div class="count-row" id="countRowRight">
        <p class="card-count hidden" id="countRight"></p>
        <div class="btn-group" id="btnGroup">
          <button class="btn btn-higher" onclick="guess('higher')">▲ Higher</button>
          <button class="btn btn-lower"  onclick="guess('lower')">▼ Lower</button>
        </div>
      </div>
      <p class="card-unit">Epstein document mentions</p>
    </div>
  </div>

</main>

<!-- ── Game Over overlay ───────────────────────────────────────────────────── -->
<div class="overlay hidden" id="overlay">
  <div class="overlay-box">
    <h2 class="overlay-title">GAME OVER</h2>
    <p class="overlay-msg">Your score</p>
    <p class="overlay-score" id="overlayScore"></p>
    <button class="btn btn-play-again" onclick="location.reload()">Play Again</button>
  </div>
</div>

<!-- ── Result flash ────────────────────────────────────────────────────────── -->
<div class="result-flash hidden" id="resultFlash"></div>

<script>
  const CSRF = '{{ csrf_token }}';
  let leftId  = {{ left.id }};
  let rightId = {{ right.id }};
  let score   = {{ score }};
  let busy    = false;

  function guess(direction) {
    if (busy) return;
    busy = true;

    document.getElementById('btnGroup').classList.add('hidden');

    const fd = new FormData();
    fd.append('left_id', leftId);
    fd.append('right_id', rightId);
    fd.append('guess', direction);
    fd.append('score', score);
    fd.append('csrfmiddlewaretoken', CSRF);

    fetch('/check/', { method: 'POST', body: fd })
      .then(r => r.json())
      .then(data => {
        const countEl = document.getElementById('countRight');
        countEl.classList.remove('hidden');
        countUp(countEl, data.right_mentions, 1000);

        showFlash(data.correct);
        score = data.score;
        const scoreEl = document.getElementById('score');
        scoreEl.textContent = score;
        scoreEl.classList.remove('score-bump');
        scoreEl.getBoundingClientRect();
        scoreEl.classList.add('score-bump');

        if (data.game_over) {
          setTimeout(() => showOverlay(score), 1600);
          return;
        }

        setTimeout(() => advance(data), 1600);
      });
  }

  function countUp(el, target, duration) {
    const startTime = performance.now();
    function tick(now) {
      const t = Math.min((now - startTime) / duration, 1);
      const eased = 1 - Math.pow(1 - t, 3); // ease-out cubic
      el.textContent = Math.round(eased * target);
      if (t < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  function showFlash(correct) {
    const vs = document.getElementById('vsCircle');
    vs.textContent = correct ? '✓' : '✗';
    vs.classList.remove('vs-resetting');
    vs.classList.add('vs-popping', correct ? 'vs-correct' : 'vs-wrong');
    setTimeout(() => {
      vs.classList.remove('vs-popping', 'vs-correct', 'vs-wrong');
      vs.classList.add('vs-resetting');
      vs.textContent = 'VS';
      setTimeout(() => vs.classList.remove('vs-resetting'), 260);
    }, 1100);
  }

  function makeBgPanel(url, contentEl) {
    const panel = document.createElement('div');
    panel.style.cssText =
      'position:relative;flex:0 0 33.333%;overflow:hidden;' +
      'display:flex;align-items:center;justify-content:center;';
    const bg = document.createElement('div');
    bg.style.cssText =
      'position:absolute;inset:0;background-size:cover;background-position:center top;' +
      'filter:blur(1px) brightness(.45) saturate(.6);' +
      `background-image:url('${url}');`;
    const ov = document.createElement('div');
    ov.style.cssText =
      'position:absolute;inset:0;' +
      'background:linear-gradient(to bottom,rgba(0,0,0,.2) 0%,rgba(0,0,0,.55) 50%,rgba(0,0,0,.75) 100%);';
    panel.appendChild(bg);
    panel.appendChild(ov);
    if (contentEl) panel.appendChild(contentEl);
    return panel;
  }

  function makeNewRightContent(name) {
    const el = document.createElement('div');
    el.className = 'card-content';
    el.innerHTML =
      '<div class="name-row"><h2 class="card-name"></h2></div>' +
      '<p class="card-label">has</p>' +
      '<div class="count-row"><div class="btn-group">' +
      '<button class="btn btn-higher">▲ Higher</button>' +
      '<button class="btn btn-lower">▼ Lower</button>' +
      '</div></div>' +
      '<p class="card-unit">Epstein document mentions</p>';
    el.querySelector('.card-name').textContent = name;
    return el;
  }

  function advance(data) {
    const gameWrap = document.getElementById('gameWrap');
    const bgLeft  = document.getElementById('bgLeft');
    const bgRight = document.getElementById('bgRight');

    // Extract raw URL from a backgroundImage style value
    const getUrl = el => el.style.backgroundImage.replace(/^url\(["']?|["']?\)$/g, '');

    // 3-panel strip: [old-left | old-right | new-right]
    // Slides left by one card width (= 33.333% of strip width)
    const strip = document.createElement('div');
    strip.style.cssText =
      'position:absolute;top:0;bottom:0;left:0;width:150%;z-index:20;display:flex;' +
      'transition:transform .5s cubic-bezier(0.4,0,0.2,1);';
    strip.appendChild(makeBgPanel(getUrl(bgLeft),
      document.querySelector('#cardLeft .card-content').cloneNode(true)));
    strip.appendChild(makeBgPanel(getUrl(bgRight),
      document.querySelector('#cardRight .card-content').cloneNode(true)));
    strip.appendChild(makeBgPanel(data.new_right.image_url,
      makeNewRightContent(data.new_right.full_name)));

    gameWrap.appendChild(strip);
    strip.getBoundingClientRect(); // force reflow
    strip.style.transform = 'translateX(-33.333%)';

    // Update real card content and bgs immediately — strip covers them
    document.getElementById('nameLeft').textContent  = data.new_left.full_name;
    document.getElementById('descLeft').textContent  = data.new_left.description;
    document.getElementById('countLeft').textContent = data.new_left.epstein_mentions;
    document.getElementById('nameRight').textContent  = data.new_right.full_name;
    document.getElementById('descRight').textContent  = data.new_right.description;
    hideBio('descLeft');
    hideBio('descRight');
    const countEl = document.getElementById('countRight');
    countEl.textContent = '';
    countEl.classList.add('hidden');
    document.getElementById('btnGroup').classList.remove('hidden');
    bgLeft.style.backgroundImage  = `url('${data.new_left.image_url}')`;
    bgRight.style.backgroundImage = `url('${data.new_right.image_url}')`;
    leftId  = data.new_left.id;
    rightId = data.new_right.id;

    // Slide complete — fade strip to reveal updated real cards
    setTimeout(() => {
      strip.style.transition = 'opacity .2s';
      strip.style.opacity    = '0';
      setTimeout(() => { strip.remove(); busy = false; }, 220);
    }, 520);
  }

  function toggleBio(id, btn) {
    const el = document.getElementById(id);
    const isHidden = el.classList.toggle('hidden');
    btn.classList.toggle('info-btn-active', !isHidden);
  }

  function hideBio(id) {
    document.getElementById(id).classList.add('hidden');
    // reset sibling info button
    const btn = document.querySelector(`[onclick="toggleBio('${id}', this)"]`);
    if (btn) btn.classList.remove('info-btn-active');
  }

  function showOverlay(finalScore) {
    document.getElementById('overlayScore').textContent = finalScore;
    document.getElementById('overlay').classList.remove('hidden');
  }
</script>
</body>
</html>
